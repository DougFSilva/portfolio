<div class="container">
  <mat-toolbar class="toolbar mat-elevation-z4" color="primary">
    <div>
      <span class="myname" (click)="ngOnInit()"> <> Douglas Ferreira</span>
    </div>

    <div>
      <ul class="list">
        <li *ngIf="listItemSelected[0]" class="list-item-selected" id="home" (click)="linkSelect($event)">Home</li>
        <li *ngIf="listItemSelected[0] == false" class="list-item" id="home" (click)="linkSelect($event)">Home</li>
        <li *ngIf="listItemSelected[1]" class="list-item-selected" id="portfolio" (click)="linkSelect($event)">Portfólio</li>
        <li *ngIf="listItemSelected[1] == false" class="list-item" id="portfolio" (click)="linkSelect($event)">Portfólio</li>
        <li *ngIf="listItemSelected[2]" class="list-item-selected" id="curriculo" (click)="linkSelect($event)">Currículo</li>
        <li *ngIf="listItemSelected[2] == false" class="list-item" id="curriculo" (click)="linkSelect($event)">Currículo</li>
        <li *ngIf="listItemSelected[3]" class="list-item-selected" id="sobremin" (click)="linkSelect($event)">Sobre mim</li>
        <li *ngIf="listItemSelected[3] == false" class="list-item" id="sobremin" (click)="linkSelect($event)">Sobre mim</li>
      </ul>
    </div>


    <button class="button-menu" mat-button (click)="drawer.toggle()"><mat-icon class="button-menu-icon">menu</mat-icon></button>

  </mat-toolbar>


  <mat-drawer-container class="sidenav" autosize>
    <mat-drawer #drawer position="end" class="sidenav-content" mode="over">
      <mat-nav-list>
        <a mat-list-item routerLink="home" (click)="drawer.toggle()">
          <mat-icon class="sidenav-link-icon">home</mat-icon>
          <span class="sidenav-link">Home</span>
        </a>
        <a mat-list-item routerLink="portfolio" (click)="drawer.toggle()">
          <mat-icon class="sidenav-link-icon">code</mat-icon>
          <span class="sidenav-link">Portfólio</span>
        </a>
        <a mat-list-item routerLink="curriculo" (click)="drawer.toggle()">
          <mat-icon class="sidenav-link-icon">description</mat-icon>
          <span class="sidenav-link">Curriculo</span>
        </a>
        <a mat-list-item routerLink="sobremin" (click)="drawer.toggle()">
          <mat-icon class="sidenav-link-icon">assignment_ind</mat-icon>
          <span class="sidenav-link">Sobre mim </span>
        </a>
      </mat-nav-list>
    </mat-drawer>


    <router-outlet></router-outlet>
  </mat-drawer-container>

</div>
