<div class="container">
  <header class="header">
    <h1 class="header-title">CURRÍCULO</h1>
  </header>

  <mat-card class="card mat-elevation-z4">
    <mat-accordion>
      <mat-expansion-panel>
        <mat-expansion-panel-header>
          <mat-panel-title class="panel-title">
            <mat-icon class="panel-title-icon">school</mat-icon>EDUCAÇÃO
          </mat-panel-title>
          <mat-panel-description> </mat-panel-description>
        </mat-expansion-panel-header>
        <mat-card class="panel-card mat-elevation-z4">
          <div class="panel-card-header">
            <h3 class="panel-card-header-title">
              TÉCNOLOGO EM ANALISE E DESENVOLVIMENTO DE SISTEMAS
            </h3>
          </div>
          <div class="panel-card-content">
            <div class="panel-card-content-key-value">
              <h3 class="panel-card-content-key">ESCOLA:</h3>
              <h3 class="panel-card-content-value">CRUZEIRO DO SUL VIRTUAL</h3>
            </div>
          </div>
        </mat-card>
      </mat-expansion-panel>

      <mat-expansion-panel
        (opened)="panelOpenState = true"
        (closed)="panelOpenState = false"
      >
        <mat-expansion-panel-header>
          <mat-panel-title class="panel-title">
            <mat-icon class="panel-title-icon">work</mat-icon>EXPERIÊNCIA
          </mat-panel-title>
          <mat-panel-description> </mat-panel-description>
        </mat-expansion-panel-header>
        <p>I'm visible because I am open</p>
      </mat-expansion-panel>
    </mat-accordion>
  </mat-card>
</div>
